name: Refresh Georgia Forecast Data

on:
  workflow_dispatch:
  schedule:
    # Friday 20:30 UTC (primary refresh after weekly CDC updates)
    - cron: "30 20 * * 5"
    # Saturday 20:30 UTC (retry/fallback refresh)
    - cron: "30 20 * * 6"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Refresh latest Georgia forecast artifacts
        run: Rscript scripts/refresh_latest_georgia_forecast.R

      - name: Commit and push if files changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add arx_model/analysis_output/live_predictions.csv
          git add data/hospitalization_rates_latest.csv
          git add data/wastewater_trends_latest.csv

          if git diff --cached --quiet; then
            echo "No updated data artifacts to commit."
            exit 0
          fi

          git commit -m "chore: refresh Georgia forecast data [skip ci]"
          git push
